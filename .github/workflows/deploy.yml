name: Larawire-Admin Deployment Pipeline

on:
  push:
    branches:
      - main
      - staging
      - user-profile
      - feature/**

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo, pdo_mysql
          tools: composer

      - name: Install backend deps
        run: composer install --no-progress --prefer-dist

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.5"

      - name: Install frontend deps
        run: npm install

      - name: Build Frontend Assets
        run: npm run build

      - name: Zip frontend build
        run: |
          cd public
          zip -r build.zip build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: public/build.zip

  pull-request:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for file changes vs main
        id: diffcheck
        run: |
          git fetch origin main
          if git diff --name-only origin/main..HEAD | grep -q .; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no changes
        if: steps.diffcheck.outputs.has_changes == 'false'
        run: |
          echo "No file changes vs main. Skipping PR."
          exit 0

      - name: Create Pull Request
        uses: desbravacloud/action-create-pull-requests@v1
        with:
          origin-branch: ${{ github.ref_name }}
          target-branch: main
          custom-title: "Auto PR created"
          custom-body: "Please, check thease changes."

  deploy-production:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: public

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Upload backend & Laravel code
        run: |
          rsync -avz --delete \
            --exclude=".git" \
            --exclude=".env" \
            --exclude="storage/" \
            --exclude="vendor/" \
            --exclude="node_modules/" \
            --exclude="public/build/" \
            ./ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.APP_PATH }}

      - name: Upload frontend build.zip
        run: |
          scp public/build.zip \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.APP_PATH }}/public/build.zip

      - name: Run production commands
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
          cd ${{ secrets.APP_PATH }} &&
          php artisan down || true &&
          unzip -o public/build.zip -d public &&
          rm -f public/build.zip &&
          composer install --no-dev --optimize-autoloader &&
          php artisan migrate --force &&
          php artisan optimize:clear &&
          php artisan optimize &&
          php artisan up
          "
          
      - name: Notify Discord on success
        if: success()
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' | sed 's/"/\\"/g')
          SHORT_SHA="${GITHUB_SHA:0:7}"

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"username\": \"Larawire-Admin CI/CD\",
              \"avatar_url\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\",
              \"embeds\": [{
                \"title\": \"✅ Production Deployment Successful\",
                \"color\": 3066993,
                \"description\": \"$COMMIT_MSG\",
                \"fields\": [
                  {\"name\": \"Repository\", \"value\": \"\`${{ github.repository }}\`\", \"inline\": true},
                  {\"name\": \"Branch\", \"value\": \"\`${{ github.ref_name }}\`\", \"inline\": true},
                  {\"name\": \"Triggered by\", \"value\": \"@${{ github.actor }}\", \"inline\": true},
                  {\"name\": \"Commit\", \"value\": \"[\`$SHORT_SHA\`](${{ github.event.head_commit.url }})\", \"inline\": false},
                  {\"name\": \"Environment\", \"value\": \"🌐 [View Site](https://buysamsung.ktmlabs.com)\", \"inline\": false}
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
                \"footer\": {
                  \"text\": \"Deployment ID: ${{ github.run_id }}\"
                }
              }]
            }" \
            ${{ secrets.DISCORD_WEBHOOK }}

      - name: Notify Discord on failure
        if: failure()
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"

          curl -H "Content-Type: application/json" \
            -X POST \
            -d "{
              \"username\": \"Larawire-Admin CI/CD\",
              \"avatar_url\": \"https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png\",
              \"embeds\": [{
                \"title\": \"❌ Production Deployment Failed\",
                \"color\": 15158332,
                \"description\": \"Deployment encountered an error and was not completed.\",
                \"fields\": [
                  {\"name\": \"Repository\", \"value\": \"\`${{ github.repository }}\`\", \"inline\": true},
                  {\"name\": \"Branch\", \"value\": \"\`${{ github.ref_name }}\`\", \"inline\": true},
                  {\"name\": \"Triggered by\", \"value\": \"@${{ github.actor }}\", \"inline\": true},
                  {\"name\": \"Failed Commit\", \"value\": \"[\`$SHORT_SHA\`](${{ github.event.head_commit.url }})\", \"inline\": false},
                  {\"name\": \"Action Logs\", \"value\": \"[View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\", \"inline\": false}
                ],
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",
                \"footer\": {
                  \"text\": \"Deployment ID: ${{ github.run_id }}\"
                }
              }]
            }" \
            ${{ secrets.DISCORD_WEBHOOK }}
